# 사업공고 스크래퍼 로컬 실행용 docker compose 정의.
#
# 서비스 구성:
#   - app:     FastAPI 기반 로컬 웹 UI. `docker compose up app` 으로 기동한다.
#              포트 8000 을 호스트에 노출한다.
#              Phase 2(00025)부터 웹이 subprocess 로 `docker compose --profile scrape run --rm scraper`
#              를 호출해 스크래퍼를 기동할 수 있도록 호스트 docker socket 을 마운트한다.
#              (docker-in-docker 아님 — 호스트 dockerd 를 원격 조작하는 방식.
#               docs/scrape_control_design.md §5 참조)
#   - scraper: 목록·상세·첨부 수집 워커. 장시간 상주 프로세스가 아니라
#              필요할 때만 1회 실행하는 형태이므로 `profiles: [scrape]` 로 분리한다.
#              실행: docker compose --profile scrape run --rm scraper
#              실행 파라미터는 sources.yaml 의 scrape: 섹션에서 제어한다.
#
# 볼륨 구성:
#   - ./data:/app/data                            : SQLite DB 파일을 호스트에 영속 보관.
#   - ./app:/app/app                              : 개발 편의를 위한 소스 바인드 마운트.
#                                                   이미지 빌드 없이도 호스트의 코드 변경이 즉시 반영된다.
#   - ./sources.yaml:/run/config/sources.yaml     : 실행 설정 주입. 이미지 빌드 없이 수정 반영.
#                                                   entrypoint.sh 가 per-run 임시 복사본을 생성한다.
#                                                   Phase 2(00025-5): app 서비스는 편집기 쓰기를 위해
#                                                   :ro 를 **제거**했다. scraper 서비스는 원본을
#                                                   실수로라도 수정하지 않도록 :ro 유지.
#   - /var/run/docker.sock:/var/run/docker.sock   : (app 서비스만) 호스트 dockerd 원격 조작용.
#                                                   docs/scrape_control_design.md §5.2 참조.
#                                                   **보안 경고**: 이 소켓 마운트는 사실상 호스트
#                                                   root 권한 부여와 동등하다 (동 문서 §15.1).
#                                                   FastAPI 를 외부 네트워크에 노출하지 않는다는
#                                                   기존 전제가 이 구성으로 더 강하게 요구된다.
#
# 환경변수는 프로젝트 루트의 `.env` 파일을 공통으로 사용한다.
# (`.env.example` 을 복사하여 생성)

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: iris-agent:dev
    container_name: iris-agent-web
    # 컨테이너를 호스트 유저 UID:GID 로 실행해 생성 파일(SQLite DB·다운로드·로그 등) 의
    # owner 가 호스트 유저가 되도록 한다. HOST_UID/HOST_GID 는 .env 에서 주입한다.
    # YAML 에서 콜론을 포함한 값은 반드시 큰따옴표로 감싸야 mapping 으로 오인되지 않는다.
    # group_add(HOST_DOCKER_GID) 는 user 지시어와 독립적으로 동작한다 — 두 설정은 충돌하지 않는다.
    user: "${HOST_UID}:${HOST_GID}"
    env_file:
      - .env
    # Phase 2(00025) — 웹 subprocess 가 호스트 dockerd 에 docker compose 호출을
    # 내릴 때 필요한 환경변수를 명시 전파한다. .env 가 비어 있어도 compose spec
    # 파싱이 깨지지 않도록 `${VAR:-}` fallback 을 사용한다. HOST_PROJECT_DIR 는
    # scrape_control.runner 가 없으면 명확한 에러를 던지므로 .env 설정이 실질
    # 필수다. 설명: docs/scrape_control_design.md §5.
    environment:
      - HOST_PROJECT_DIR=${HOST_PROJECT_DIR:-}
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME:-iris-agent}
      # 00029 — 컨테이너 타임존을 호스트와 동기화한다. DB 는 여전히 UTC 로
      # 저장되고(PROJECT_NOTES '시각 처리' 정책 유지), 이 설정은 loguru 로그
      # 타임스탬프·`date` 출력 등 **프레젠테이션 계층** 의 시각 체감만 바꾼다.
      # python:3.12-slim 은 tzdata 전체를 내장하지 않으므로 TZ 이름 조회가
      # 실패할 수 있는데, 아래 /etc/localtime 바인드 마운트가 libc 레벨에서
      # 동일 결과를 강제하므로 두 장치가 보완적으로 동작한다. HOST_TZ 를
      # .env 에 설정하면 기본값(Asia/Seoul) 을 덮어쓸 수 있다.
      - TZ=${HOST_TZ:-Asia/Seoul}
      # 00032 — docker CLI 절대경로를 명시해 APScheduler 백그라운드 컨텍스트의
      # 제한된 PATH 에서도 _resolve_docker_binary() 가 shutil.which 탐색 없이
      # 곧바로 사용할 수 있게 한다. 이미지에 docker.io 가 설치된 경우(이미지
      # 재빌드 후)에만 유효하다. 파일이 없으면 수집 트리거 시 명확한 에러 발생.
      - DOCKER_BINARY=/usr/bin/docker
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./app:/app/app
      # Phase 2(00025-5): 관리자 페이지의 [sources.yaml] 편집기가 호스트 원본
      # 파일을 직접 수정해야 하므로 app 서비스에서는 `:ro` 를 제거한다.
      # scraper 서비스는 per-run 임시 복사본만 사용해 원본을 건드리지 않으므로
      # `:ro` 를 유지(아래 scraper.volumes 참조). 편집기 구현 주의사항:
      #   - entrypoint.sh 가 기동 시 만드는 per-run 복사본과는 별개 파일이다.
      #     편집기 → 원본 수정 → **다음** 수집 실행부터 반영.
      #   - 원자적 쓰기는 NamedTemporaryFile + os.replace. bind mount 가 파일
      #     단위일 때 EXDEV 가 나오면 app/sources/yaml_editor.py 가 직접
      #     overwrite + fsync 로 fallback.
      - ./sources.yaml:/run/config/sources.yaml
      # 호스트 docker daemon 소켓을 마운트해 app 컨테이너에서 docker CLI 로
      # 'docker compose --profile scrape run --rm scraper' 를 subprocess 호출할 수 있게 한다.
      # docker-in-docker 가 아니라 호스트 dockerd 를 조작하는 방식이므로,
      # 스크래퍼 컨테이너의 ./data / ./app / ./sources.yaml 바인드 마운트는
      # 여전히 호스트 경로 기준으로 일관되게 적용된다.
      # 보안상 root 권한 부여와 동등하다는 경고는 docs/scrape_control_design.md §15.1 참조.
      - /var/run/docker.sock:/var/run/docker.sock
      # 00029 — 호스트 타임존 정보를 읽기 전용으로 공유. 위 TZ 환경변수와
      # 짝을 이뤄 컨테이너의 `date`/loguru 등이 호스트와 동일 시각으로 동작한다.
      # 호스트(Linux/macOS) 의 /etc/localtime 은 보통 zoneinfo 파일에 대한
      # 심볼릭 링크이므로 읽기 전용 마운트로 충분하다. 호스트에 이 경로가
      # 없는(최소 설치) 환경이라면 compose 가 실패하므로 .env 에 HOST_TZ 만
      # 설정하고 이 한 줄을 주석 처리해도 된다.
      - /etc/localtime:/etc/localtime:ro
      # 운영자 CLI 스크립트(create_admin.py 등) 노출.
      - ./scripts:/app/scripts
    # 컨테이너 내부 유저가 호스트 docker 그룹의 gid 를 가지도록 group_add 로 주입한다.
    # HOST_DOCKER_GID 는 호스트의 `getent group docker | cut -d: -f3` 값으로 .env 에 설정.
    # Debian/Ubuntu 기본값이 999 인 경우가 많아 fallback 으로 둔다. 값 불일치 시
    # app 컨테이너에서 `docker ps` 호출이 "Permission denied on docker.sock" 로 실패한다.
    # docs/scrape_control_design.md §5.2 참조.
    group_add:
      - "${HOST_DOCKER_GID:-999}"
    command:
      - uvicorn
      - app.web.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    restart: unless-stopped

  scraper:
    build:
      context: .
      dockerfile: docker/Dockerfile
    # app 서비스와 동일한 이미지를 재사용하여 빌드 시간을 절약한다.
    image: iris-agent:dev
    container_name: iris-agent-scraper
    # app 서비스와 동일한 이유로 호스트 유저 UID:GID 로 실행한다.
    # Playwright 가 생성하는 다운로드 파일·임시 파일 포함 모든 런타임 산출물의 owner 를 맞춘다.
    user: "${HOST_UID}:${HOST_GID}"
    # 기본 `up` 에서 기동되지 않도록 프로파일로 격리한다.
    # 실행: docker compose --profile scrape run --rm scraper
    profiles:
      - scrape
    # Playwright headless chromium 이 /dev/shm 공유 메모리를 사용한다.
    # Docker 기본값(64 MB)은 Chromium 렌더러 프로세스 크래시를 유발하므로 256 MB 로 확장한다.
    shm_size: '256m'
    env_file:
      - .env
    # 00029 — app 서비스와 동일한 TZ 정책을 scraper 에도 적용해, subprocess
    # 로그 파일(/app/data/logs/scrape_runs/{id}.log) 의 타임스탬프도 호스트
    # 시각을 따르도록 한다. 내부 동작 설명은 app 서비스의 environment 주석 참고.
    environment:
      - TZ=${HOST_TZ:-Asia/Seoul}
    volumes:
      - ./data:/app/data
      - ./app:/app/app
      - ./sources.yaml:/run/config/sources.yaml:ro
      # 00029 — 위 TZ 환경변수와 짝을 이루는 호스트 /etc/localtime 공유.
      # app 서비스의 동일 마운트 주석 참고.
      - /etc/localtime:/etc/localtime:ro
    # 수집 파라미터는 sources.yaml 의 scrape: 섹션에서 제어한다.
    # entrypoint.sh 가 SOURCES_CONFIG_PATH 를 주입한 뒤 command 를 exec 한다.
    # CLI 인자는 사용하지 않는다.
    command:
      - python
      - -m
      - app.cli
