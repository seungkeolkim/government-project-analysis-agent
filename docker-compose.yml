# IRIS 사업공고 스크래퍼 로컬 실행용 docker compose 정의.
#
# 서비스 구성:
#   - app:     FastAPI 기반 로컬 웹 UI. `docker compose up app` 으로 기동한다.
#              포트 8000 을 호스트에 노출한다.
#   - scraper: httpx 기반 목록 수집 CLI. 장시간 상주 프로세스가 아니라
#              필요할 때만 1회 실행하는 형태이므로 `profiles: [scrape]` 로 분리한다.
#              실행: docker compose --profile scrape run --rm scraper
#
# 볼륨 구성:
#   - ./data:/app/data  : SQLite DB 파일을 호스트에 영속 보관.
#   - ./app:/app/app    : 개발 편의를 위한 소스 바인드 마운트.
#                          이미지 빌드 없이도 호스트의 코드 변경이 즉시 반영된다.
#
# 환경변수는 프로젝트 루트의 `.env` 파일을 공통으로 사용한다.
# (`.env.example` 을 복사하여 생성)

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: iris-agent:dev
    container_name: iris-agent-web
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./app:/app/app
    command:
      - uvicorn
      - app.web.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    restart: unless-stopped

  scraper:
    build:
      context: .
      dockerfile: docker/Dockerfile
    # app 서비스와 동일한 이미지를 재사용하여 빌드 시간을 절약한다.
    image: iris-agent:dev
    container_name: iris-agent-scraper
    # 기본 `up` 에서 기동되지 않도록 프로파일로 격리한다.
    # 실행: docker compose --profile scrape run --rm scraper
    profiles:
      - scrape
    # Playwright headless chromium 이 /dev/shm 공유 메모리를 사용한다.
    # Docker 기본값(64 MB)은 Chromium 렌더러 프로세스 크래시를 유발하므로 256 MB 로 확장한다.
    shm_size: '256m'
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./app:/app/app
    # '접수중' 목록을 수집하고 DB에 적재한다.
    # 인자 오버라이드 예시:
    #   docker compose --profile scrape run --rm scraper python -m app.cli run --max-pages 1 --dry-run
    command:
      - python
      - -m
      - app.cli
      - run
