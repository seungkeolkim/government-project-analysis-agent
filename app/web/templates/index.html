<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>IRIS 공고 목록 (placeholder)</title>
</head>
<body>
    {# 실제 HTML 마크업은 다음 subtask 에서 교체된다. 라우트 부팅 검증용 최소 placeholder. #}
    <h1>IRIS 공고 목록</h1>
    <p>총 {{ total }}건 / 페이지 {{ page }} / {{ total_pages }}</p>
    <ul>
        {% for announcement in announcements %}
        <li>
            <a href="/announcements/{{ announcement.id }}">{{ announcement.title }}</a>
            ({{ announcement.status.value }})
        </li>
        {% endfor %}
    </ul>
</body>
</html>
