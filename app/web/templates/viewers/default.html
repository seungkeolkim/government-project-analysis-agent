{#
  알 수 없는 소스 유형의 기본 뷰어.

  새 소스를 추가할 때 해당 소스의 viewers/<source_type>.html 을 만들기 전까지
  이 파일이 폴백으로 사용된다.
#}
<div class="detail-not-fetched">
    <p>이 소스 유형(<strong>{{ announcement.source_type }}</strong>)에 대한 viewer 가 아직 등록되지 않았습니다.</p>
    {% if announcement.detail_url %}
        <p>
            원문을 직접 확인하세요:
            <a href="{{ announcement.detail_url }}" target="_blank" rel="noopener noreferrer">
                {{ announcement.detail_url }}
            </a>
        </p>
    {% endif %}
</div>
