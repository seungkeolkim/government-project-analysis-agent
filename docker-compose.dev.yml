# dev override (uvicorn hot reload).
# 단독 실행 금지 — `./compose.sh dev` 또는
# `docker compose -f docker-compose.yml -f docker-compose.dev.yml ...` 형태로만 사용한다.

services:
  app:
    command:
      - uvicorn
      - app.web.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
      - --reload-dir
      - /app/app
