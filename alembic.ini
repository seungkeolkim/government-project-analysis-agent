# Alembic 설정 파일.
#
# sqlalchemy.url 은 의도적으로 비워두고, alembic/env.py 에서
# app.config.get_settings().db_url 을 동적으로 주입한다.
# 절대 여기에 접속 문자열을 하드코딩하지 말 것.

[alembic]
# migration 파일이 위치하는 디렉터리
script_location = alembic

# 버전 파일명 포맷: 날짜시간_revisionID_slug
# 예: 20260422_1430_a1b2c3d4_baseline_initial_schema.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# env.py 에서 app 패키지를 import 하려면 프로젝트 루트가 sys.path에 있어야 한다.
prepend_sys_path = .

# timezone-aware datetime 을 migration 파일 헤더에 기록한다.
timezone = UTC

# 접속 URL — env.py 가 override 하므로 비워둔다.
sqlalchemy.url =


[post_write_hooks]
# 생성된 migration 파일에 ruff 포매터를 자동 적용한다.
# hooks = ruff
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME


# 로깅 설정
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
