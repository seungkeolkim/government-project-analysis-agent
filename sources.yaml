# 공고 수집 소스 설정
# enabled: true 인 소스만 크롤러 실행 시 활성화된다.
# 각 소스 id 는 app/sources/constants.py 의 SOURCE_TYPE_* 상수와 일치해야 한다.

sources:
  - id: IRIS
    enabled: true
    base_url: https://www.iris.go.kr/contents/retrieveBsnsAncmBtinSituListView.do
    request_delay_sec: 1.5
    statuses:
      - 접수예정
      - 접수중
      - 마감

  - id: NTIS
    enabled: true
    # 목록 POST 엔드포인트 (docs/ntis_site_exploration.md §1)
    base_url: https://www.ntis.go.kr/rndgate/eg/un/ra/mng.do
    request_delay_sec: 2.0
    # 마감 공고가 74,809건에 달하므로 기본값을 보수적으로 설정한다 (탐사 §1).
    # 필요 시 CLI --max-pages / --max-announcements 로 일시 확장 가능.
    max_pages: 5
    max_announcements: 100
    statuses:
      - 접수예정
      - 접수중
      - 마감
    # credentials 슬롯: NTIS 는 로그인 불필요(게스트 수집 가능)이므로 설정하지 않는다.
    # 로그인이 필요한 소스는 NTIS_USERNAME / NTIS_PASSWORD 환경변수로 주입한다.
